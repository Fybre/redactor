services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redactor-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/redactor.db
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - ORIGINALS_DIR=/data/originals
    volumes:
      - redactor-data:/data
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: redactor-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  ollama:
    image: ollama/ollama:latest
    container_name: redactor-ollama
    restart: unless-stopped
    profiles: [ollama]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    profiles: [ollama]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c", "ollama pull $$OLLAMA_MODEL"]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  redactor-data:
    driver: local
  ollama-data:
    driver: local

networks:
  internal:
    driver: bridge
