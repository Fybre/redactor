<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redactor — Validate Regions</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .validate-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
      flex: 1;
    }

    /* Left: page strip */
    .page-strip {
      width: 120px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .page-thumb {
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface2);
      position: relative;
    }

    .page-thumb.active { border-color: var(--accent); }

    .page-thumb img {
      width: 100%;
      display: block;
    }

    .page-thumb .page-label {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      padding: 2px 0;
    }

    .page-thumb .badge-count {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      border-radius: 10px;
      padding: 0 5px;
      line-height: 16px;
    }

    /* Centre: canvas area */
    .canvas-area {
      flex: 1;
      overflow: auto;
      background: #111;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .page-container {
      position: relative;
      display: inline-block;
      user-select: none;
    }

    .page-container img {
      display: block;
      max-width: 100%;
    }

    .page-container svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    /* Right: region list */
    .region-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .region-panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .region-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .region-item {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color 0.15s;
      font-size: 12px;
    }

    .region-item:hover { border-color: var(--accent); }
    .region-item.selected { border-color: #fff; background: #252d50; box-shadow: 0 0 0 1px #fff; }
    .region-item.hovered { border-color: var(--accent); background: #1a2035; }

    .region-item.status-approved      { border-left: 3px solid #22c55e; }
    .region-item.status-auto_approved { border-left: 3px solid #14b8a6; }
    .region-item.status-rejected      { border-left: 3px solid #ef4444; opacity: 0.6; }
    .region-item.status-pending       { border-left: 3px solid #f97316; }

    .region-entity {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .region-text {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .region-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: var(--muted);
    }

    .region-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    /* Bottom toolbar */
    .toolbar {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* SVG rect colours */
    .overlay-pending       { fill: rgba(249,115,22,0.25);  stroke: #f97316; stroke-width: 2; }
    .overlay-approved      { fill: rgba(34,197,94,0.2);   stroke: #22c55e; stroke-width: 2; }
    .overlay-auto_approved { fill: rgba(20,184,166,0.2);  stroke: #14b8a6; stroke-width: 2; stroke-dasharray: 6 2; }
    .overlay-rejected      { fill: rgba(239,68,68,0.1);   stroke: #ef4444; stroke-width: 1; stroke-dasharray: 4; }
    .overlay-user          { fill: rgba(59,130,246,0.2);  stroke: #3b82f6; stroke-width: 2; }
    .overlay-drawing       { fill: rgba(59,130,246,0.15); stroke: #3b82f6; stroke-width: 1; stroke-dasharray: 4; }
    .overlay-focused       { stroke-width: 3 !important; stroke: #fff !important; filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.5)); opacity: 1 !important; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-size: 16px;
      color: var(--text);
    }

    .badge-approved      { background: #166534; color: #4ade80; }
    .badge-auto_approved { background: #134e4a; color: #5eead4; }
    .badge-rejected      { background: #7f1d1d; color: #fca5a5; }
    .badge-pending       { background: #7c2d12; color: #fdba74; }
    .badge-user          { background: #1e3a5f; color: #93c5fd; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>🔒 Redactor</h1>
      <span>Document Redaction Service</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="upload.html"><span class="icon">⬆</span> Upload</a>
      <a href="config.html"><span class="icon">⚙</span> Configuration</a>
      <a href="guide.html"><span class="icon">📖</span> Guide</a>
    </nav>
    <div class="sidebar-bottom">Redactor v1.0</div>
  </aside>

  <div class="validate-layout">
    <div class="page-strip" id="page-strip"></div>

    <div class="canvas-area" id="canvas-area">
      <div class="page-container" id="page-container">
        <img id="page-img" src="" alt="Page">
        <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="region-panel">
      <div class="region-panel-header">
        <span>Regions</span>
        <span id="region-summary" style="font-weight:400;color:var(--muted);font-size:11px"></span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);flex-shrink:0">
        <button class="btn btn-ghost btn-sm" id="btn-prev-page" onclick="prevPage()" style="padding:2px 8px">&#8592; Prev</button>
        <span id="page-nav-indicator">1 / 1</span>
        <button class="btn btn-ghost btn-sm" id="btn-next-page" onclick="nextPage()" style="padding:2px 8px">Next &#8594;</button>
      </div>
      <div class="region-list" id="region-list"></div>
      <div class="toolbar">
        <button class="btn btn-ghost btn-sm" onclick="approveAll()">Approve All</button>
        <button class="btn btn-ghost btn-sm" onclick="rejectAll()">Reject All</button>
        <button class="btn btn-primary" id="apply-btn" onclick="saveAndApply()" style="margin-left:auto">
          Save &amp; Apply
        </button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loading">Loading…</div>
  <div id="toast-container"></div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/validate.js?v=2"></script>
</body>
</html>
